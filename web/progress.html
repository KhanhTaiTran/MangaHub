<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MangaHub - Progress</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
      <span class="brand">MangaHub</span>
      <a href="index.html">Login</a>
      <a href="register.html">Register</a>
      <a href="profile.html">Profile</a>
      <a href="manga.html">Manga</a>
      <a href="library-add.html">Add Library</a>
      <a href="library-list.html">Library</a>
      <a href="progress.html" class="active">Progress</a>
      <a href="notify.html">Notify</a>
      <a href="chat.html">Chat</a>
      <span class="api-base">API: <span id="api-base"></span></span>
    </nav>

    <header class="page-title">
      <h1>Update Progress</h1>
      <p class="muted">Update reading progress for a manga.</p>
    </header>

    <section class="panel">
      <h2>Session</h2>
      <div class="field">
        <label for="token">JWT token</label>
        <input id="token" type="text" placeholder="paste token here" />
      </div>
      <div class="row">
        <button id="btn-set-token">Save Token</button>
        <button id="btn-logout">Logout</button>
      </div>
      <p class="muted">Token status: <span id="token-short">none</span></p>
    </section>

    <section class="panel">
      <h2>Update Progress</h2>
      <div class="field">
        <label for="progress-manga">Manga ID</label>
        <input id="progress-manga" type="text" placeholder="manga_id" />
      </div>
      <div class="field">
        <label for="progress-list">List name</label>
        <input id="progress-list" type="text" placeholder="reading" />
      </div>
      <div class="field">
        <label for="progress-status">Status</label>
        <input id="progress-status" type="text" placeholder="reading" />
      </div>
      <div class="field">
        <label for="progress-chapter">Current chapter</label>
        <input id="progress-chapter" type="number" min="0" placeholder="1" />
      </div>
      <div class="row">
        <button id="btn-progress">Update</button>
      </div>
      <pre id="progress-log" class="log"></pre>
    </section>

    <script src="app.js"></script>
  </body>
</html>
